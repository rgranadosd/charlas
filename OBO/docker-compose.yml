services:
  backend:
    image: python:3.11-slim
    working_dir: /workspace/backend
    command: >-
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - ./backend/.env
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"

  resource_api:
    image: python:3.11-slim
    working_dir: /workspace/resource_api
    command: >-
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"
    env_file:
      - ./resource_api/.env
    volumes:
      - ./:/workspace
    ports:
      - "8001:8001"

  frontend:
    image: node:20
    working_dir: /workspace/frontend
    command: >-
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8091"
    env_file:
      - ./frontend/.env
    volumes:
      - ./:/workspace
    ports:
      - "8091:8091"
    depends_on:
      - backend
      - resource_api
